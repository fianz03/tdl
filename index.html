<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TDL Generator Pro</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent-color: #6366f1;
            --accent-hover: #4f46e5;
            --text-main: #f8fafc;
            --text-muted: #cbd5e1;
            --input-bg: rgba(15, 23, 42, 0.6);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(99, 102, 241, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(168, 85, 247, 0.15), transparent 25%);
            color: var(--text-main);
            min-height: 100vh;
            padding: 2rem;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 1000px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            height: fit-content;
        }

        h1, h2 {
            font-weight: 600;
            margin-bottom: 1.5rem;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        label {
            display: block;
            font-size: 0.875rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        input, select, textarea {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            outline: none;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        button {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        button:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }

        button.outline {
            background: transparent;
            border: 1px dashed var(--accent-color);
            color: var(--accent-color);
        }

        button.outline:hover {
            background: rgba(99, 102, 241, 0.1);
        }

        .project-card {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            position: relative;
            animation: slideIn 0.3s ease out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .project-card .remove-btn {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            width: 32px;
            height: 32px;
            padding: 0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .project-card .remove-btn:hover {
            background: rgba(239, 68, 68, 0.3);
            transform: scale(1.05);
        }

        .output-container {
            position: relative;
        }

        .output-preview {
            background: #000;
            border-radius: 8px;
            padding: 1.5rem;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.9rem;
            color: #a5b4fc;
            white-space: pre-wrap;
            min-height: 300px;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.05);
            line-height: 1.5;
        }

        .copy-btn {
            position: absolute;
            top: 1rem;
            right: 1rem;
            width: auto;
            padding: 0.5rem 1rem;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.2);
            font-size: 0.8rem;
        }

        .copy-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .projects-list {
            max-height: 50vh;
            overflow-y: auto;
            padding-right: 0.5rem;
        }
        
        .projects-list::-webkit-scrollbar {
            width: 6px;
        }
        .projects-list::-webkit-scrollbar-thumb {
            background: var(--glass-border);
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Editor Panel -->
        <div class="panel">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                <h1 style="margin-bottom: 0;">✍️ Form TDL</h1>
                <button onclick="toggleImport()" class="outline" style="width: auto; padding: 0.5rem 1rem; font-size: 0.8rem;">
                    📋 Import TDL Lama
                </button>
            </div>

            <div id="importSection" style="display: none; margin-bottom: 1.5rem; padding: 1rem; background: rgba(0,0,0,0.2); border-radius: 8px; border: 1px dashed var(--accent-color);">
                <label>Paste TDL Lama di sini:</label>
                <textarea id="importArea" style="min-height: 150px; font-family: monospace; font-size: 0.8rem; margin-bottom: 1rem;" placeholder="=========================================\n          DAILY TO-DO LIST\n..."></textarea>
                <div style="display: flex; gap: 1rem;">
                    <button onclick="parseTDL()">Gunakan Data Ini</button>
                    <button class="outline" onclick="toggleImport()">Batal</button>
                </div>
            </div>

            <div id="formContent">
            <div class="form-group">
                <label>Tanggal</label>
                <input type="date" id="dateInput">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Start Time</label>
                    <input type="time" id="startTimeInput">
                </div>
                <div class="form-group">
                    <label>End Time</label>
                    <input type="time" id="endTimeInput" placeholder="Contoh: 17:00">
                </div>
            </div>

            <div class="projects-list" id="projectsContainer">
                <!-- Project cards will be injected here -->
            </div>

            <button class="outline" onclick="addProject()" style="margin-top: 1rem;">
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                Tambah Projek Baru
            </button>
            </div>
        </div>

        <!-- Output Panel -->
        <div class="panel">
            <h2>✨ Preview Generate</h2>
            <div class="output-container">
                <div class="output-preview" id="outputPreview">Silakan isi form di samping untuk mulai...</div>
                <button class="copy-btn" onclick="copyOutput()" id="copyBtn">
                    <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                    Copy Teks
                </button>
            </div>
        </div>
    </div>

    <script>
        const days = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];
        const months = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
        
        let projectIdCounter = 0;

        function toggleImport() {
            const importSec = document.getElementById('importSection');
            const formCont = document.getElementById('formContent');
            if (importSec.style.display === 'none') {
                importSec.style.display = 'block';
                formCont.style.display = 'none';
                document.getElementById('importArea').value = '';
            } else {
                importSec.style.display = 'none';
                formCont.style.display = 'block';
            }
        }

        function parseTDL() {
            const text = document.getElementById('importArea').value;
            if (!text.trim()) return;

            const dateMatch = text.match(/Tanggal\s*:\s*[^,]+,\s*(\d{1,2})\s+([a-zA-Z]+)\s+(\d{4})/);
            if (dateMatch) {
                const day = dateMatch[1].padStart(2, '0');
                const monthStr = dateMatch[2].toLowerCase();
                const year = dateMatch[3];
                const monthsMap = {
                    'januari': '01', 'februari': '02', 'maret': '03', 'april': '04', 'mei': '05', 'juni': '06',
                    'juli': '07', 'agustus': '08', 'september': '09', 'oktober': '10', 'november': '11', 'desember': '12'
                };
                const month = monthsMap[monthStr] || '01';
                document.getElementById('dateInput').value = `${year}-${month}-${day}`;
            }

            const timeMatch = text.match(/Waktu\s*:\s*([\d:]+)\s*-\s*([^ \n]+)/);
            if (timeMatch) {
                document.getElementById('startTimeInput').value = timeMatch[1];
                document.getElementById('endTimeInput').value = timeMatch[2] === '[End]' ? '' : timeMatch[2];
            }

            document.getElementById('projectsContainer').innerHTML = '';
            
            const projectBlocks = text.split(/\[ PROJECT:\s*(.*?)\s*\]/g);
            
            if (projectBlocks.length > 1) {
                for (let i = 1; i < projectBlocks.length; i += 2) {
                    const projName = projectBlocks[i];
                    let content = projectBlocks[i+1];
                    content = content.replace(/={10,}/g, '');

                    let progressTxt = '';
                    let doneTxt = '';

                    const progressSplit = content.split('>> IN PROGRESS');
                    if (progressSplit.length > 1) {
                        const doneSplit = progressSplit[1].split('>> DONE');
                        progressTxt = doneSplit[0].trim();
                        if (doneSplit.length > 1) {
                            doneTxt = doneSplit[1].trim();
                        }
                    } else {
                        const doneSplit = content.split('>> DONE');
                        if (doneSplit.length > 1) {
                            doneTxt = doneSplit[1].trim();
                        }
                    }

                    progressTxt = cleanPrefixes(progressTxt);
                    doneTxt = cleanPrefixes(doneTxt);

                    addProjectWithValue(projName, progressTxt, doneTxt);
                }
            } else {
                addProject();
            }

            toggleImport();
            generateOutput();
        }

        function cleanPrefixes(text) {
            if (!text) return '';
            return text.split('\n').map(line => {
                let cl = line.replace(/^\[[ x]\]\s*/, '');
                if (cl.trim() === '-') return '';
                return cl;
            }).filter(line => line.trim() !== '').join('\n').trim();
        }

        function addProjectWithValue(name, progress, done) {
            const id = projectIdCounter++;
            const container = document.getElementById('projectsContainer');
            const card = document.createElement('div');
            card.className = 'project-card';
            card.id = `project-${id}`;
            
            let optionsHTML = '';
            ['ERP 1', 'ERP 2', 'WEB'].forEach(opt => {
                optionsHTML += `<option value="${opt}" ${opt === name.trim() ? 'selected' : ''}>${opt}</option>`;
            });

            card.innerHTML = `
                <button class="remove-btn" onclick="removeProject(${id})" title="Hapus Projek">
                    <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
                <div class="form-group">
                    <label>Nama Projek</label>
                    <select class="project-select" onchange="generateOutput()">
                        ${optionsHTML}
                    </select>
                </div>
                <div class="form-group">
                    <label>In Progress</label>
                    <textarea class="progress-input" oninput="generateOutput()">${progress}</textarea>
                </div>
                <div class="form-group">
                    <label>Done</label>
                    <textarea class="done-input" oninput="generateOutput()">${done}</textarea>
                </div>
            `;
            container.appendChild(card);
        }

        // Initialize with current date and one default project
        document.addEventListener('DOMContentLoaded', () => {
            const today = new Date();
            document.getElementById('dateInput').valueAsDate = today;
            addProject();
            setupEventListeners();
            generateOutput();
        });

        function setupEventListeners() {
            document.getElementById('dateInput').addEventListener('input', generateOutput);
            document.getElementById('startTimeInput').addEventListener('input', generateOutput);
            document.getElementById('endTimeInput').addEventListener('input', generateOutput);
        }

        function addProject() {
            const id = projectIdCounter++;
            const container = document.getElementById('projectsContainer');
            
            const card = document.createElement('div');
            card.className = 'project-card';
            card.id = `project-${id}`;
            
            card.innerHTML = `
                <button class="remove-btn" onclick="removeProject(${id})" title="Hapus Projek">
                    <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
                
                <div class="form-group">
                    <label>Nama Projek</label>
                    <select class="project-select" onchange="generateOutput()">
                        <option value="ERP 1">ERP 1</option>
                        <option value="ERP 2" selected>ERP 2</option>
                        <option value="WEB">WEB</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>In Progress</label>
                    <textarea class="progress-input" placeholder="Contoh:&#10;Master > Kehadiran&#10;    - Revisi layout" oninput="generateOutput()"></textarea>
                </div>

                <div class="form-group">
                    <label>Done</label>
                    <textarea class="done-input" placeholder="Contoh:&#10;Task selesai" oninput="generateOutput()"></textarea>
                </div>
            `;
            
            container.appendChild(card);
            generateOutput();
        }

        function removeProject(id) {
            const el = document.getElementById(`project-${id}`);
            if (el) {
                el.style.opacity = '0';
                setTimeout(() => {
                    el.remove();
                    generateOutput();
                }, 200);
            }
        }

        function formatDateIndo(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr);
            const dayName = days[date.getDay()];
            const day = date.getDate();
            const month = months[date.getMonth()];
            const year = date.getFullYear();
            return `${dayName}, ${day} ${month} ${year}`;
        }

        function formatTasks(text, isDone) {
            if (!text.trim()) return isDone ? '[x] -' : '[ ] -';
            
            const lines = text.split('\n');
            let result = '';
            
            lines.forEach(line => {
                if (line.trim() === '') return;
                
                // Cek apakah line diawali dengan spasi, tab, atau strip '-'
                const isSubtask = /^[\s\t]/.test(line) || line.trim().startsWith('-');
                
                if (isSubtask) {
                    result += line + '\n';
                } else {
                    // Jika sudah mengandung [ ] atau [x], tidak perlu ditambah lagi
                    if (line.trim().startsWith('[ ]') || line.trim().startsWith('[x]')) {
                        result += line + '\n';
                    } else {
                        result += (isDone ? '[x] ' : '[ ] ') + line + '\n';
                    }
                }
            });
            
            return result.trimEnd();
        }

        function generateOutput() {
            const dateVal = document.getElementById('dateInput').value;
            const startVal = document.getElementById('startTimeInput').value || '[Start]';
            const endVal = document.getElementById('endTimeInput').value || '[End]';

            let output = `=========================================\n`;
            output += `          DAILY TO-DO LIST\n`;
            output += `=========================================\n`;
            output += `Tanggal : ${formatDateIndo(dateVal)}\n`;
            output += `Waktu   : ${startVal} - ${endVal}\n`;

            const projects = document.querySelectorAll('.project-card');
            
            projects.forEach(card => {
                const projName = card.querySelector('.project-select').value;
                const progressTxt = card.querySelector('.progress-input').value;
                const doneTxt = card.querySelector('.done-input').value;

                output += `\n[ PROJECT: ${projName} ]\n\n`;
                output += `>> IN PROGRESS\n`;
                output += `${formatTasks(progressTxt, false)}\n`;
                
                output += `>> DONE\n`;
                output += `${formatTasks(doneTxt, true)}\n`;
            });

            output += `=========================================\n`;

            document.getElementById('outputPreview').textContent = output;
        }

        async function copyOutput() {
            const text = document.getElementById('outputPreview').textContent;
            try {
                await navigator.clipboard.writeText(text);
                const btn = document.getElementById('copyBtn');
                const originalText = btn.innerHTML;
                btn.innerHTML = '✅ Tersalin!';
                btn.style.background = 'rgba(34, 197, 94, 0.2)';
                btn.style.color = '#4ade80';
                
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.style.background = '';
                    btn.style.color = '';
                }, 2000);
            } catch (err) {
                alert('Gagal menyalin teks!');
            }
        }
    </script>
</body>
</html>
